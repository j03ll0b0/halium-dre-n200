name: Build Halium Kernel for OnePlus N200

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  KERNEL_REPO: OnePlusOSS/android_kernel_oneplus_sm4350
  KERNEL_BRANCH: oneplus/SM4350_R_11.0
  DEVICE_CODENAME: dre
  KERNEL_IMAGE_NAME: Image

jobs:
  build-kernel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential clang cpio flex \
            gcc-aarch64-linux-gnu git kmod libelf-dev \
            libssl-dev lz4 make python3 rsync
          echo "Toolchains:"
          aarch64-linux-gnu-gcc --version | head -1
          clang --version | head -1

      - name: Clone kernel source
        run: |
          git clone --depth 1 --branch $KERNEL_BRANCH \
            https://github.com/$KERNEL_REPO.git kernel
          cd kernel
          echo "Kernel source cloned."
          git log --oneline -1
          echo "=== techpack/oneplus/ contents ==="
          ls -1 techpack/oneplus/
          cd ..

      - name: Patch kernel tree for missing OnePlus techpack directories
        run: |
          cd kernel

          # The public OnePlus kernel source tree is incomplete -- several
          # directories referenced in techpack/oneplus/Makefile are missing.
          # Create stub directories and empty Makefiles to allow the build
          # to proceed. The conditionals in the Makefile should exclude
          # most of these for holi platforms, but _modbuiltin traversal
          # doesn't respect those conditionals.

          echo "Creating stub directories for missing techpack components..."

          # Create a helper script to stub missing dirs
          for dir in techpack/oneplus/power \
                     techpack/oneplus/tri_state_key \
                     techpack/oneplus/slabtrace; do
            if [ ! -d "$dir" ]; then
              mkdir -p "$dir"
              # Empty Makefile that does nothing
              echo "# Stub Makefile - directory not present in public source" > "$dir/Makefile"
              echo "obj-y :=" >> "$dir/Makefile"
              echo "  Created: $dir/Makefile"
            fi
          done

          # Verify techpack/oneplus/ Makefile
          echo ""
          echo "=== techpack/oneplus/Makefile key lines ==="
          grep -E "obj-|ifeq|ifndef|ifneq" techpack/oneplus/Makefile | head -20

          cd ..
          echo "Done."

      - name: Build kernel config
        run: |
          cd kernel

          # Step 1: Base defconfig
          make ARCH=arm64 defconfig

          # Step 2: Apply the holi QGKI fragment (device-specific)
          scripts/kconfig/merge_config.sh -m .config \
            arch/arm64/configs/vendor/holi_QGKI.config

          # Step 3: Apply our Halium config fragment
          mkdir -p ../patches
          cat > ../patches/halium.config << 'ENDOFHALIUM'
CONFIG_NAMESPACES=y
CONFIG_NET_NS=y
CONFIG_PID_NS=y
CONFIG_IPC_NS=y
CONFIG_UTS_NS=y
CONFIG_USER_NS=y
CONFIG_CGROUPS=y
CONFIG_CGROUP_CPUACCT=y
CONFIG_CGROUP_SCHED=y
CONFIG_FAIR_GROUP_SCHED=y
CONFIG_RT_GROUP_SCHED=y
CONFIG_SECCOMP=y
CONFIG_SECCOMP_FILTER=y
CONFIG_KEYS=y
CONFIG_SECURITY=y
CONFIG_SECURITY_SELINUX=y
CONFIG_SECURITY_SELINUX_BOOTPARAM=y
CONFIG_SECURITY_SELINUX_DEVELOP=y
CONFIG_DEVTMPFS=y
CONFIG_DEVTMPFS_MOUNT=y
CONFIG_TMPFS=y
CONFIG_TMPFS_POSIX_ACL=y
CONFIG_SQUASHFS=y
CONFIG_SQUASHFS_LZ4=y
CONFIG_IKCONFIG=y
CONFIG_IKCONFIG_PROC=y
CONFIG_LOG_BUF_SHIFT=18
CONFIG_PRINTK_TIME=y
CONFIG_MAGIC_SYSRQ=y
CONFIG_NETFILTER=y
CONFIG_IP_NF_IPTABLES=y
CONFIG_IP_NF_FILTER=y
CONFIG_IP_NF_NAT=y
CONFIG_NETFILTER_XTABLES=y
CONFIG_NETFILTER_XT_MATCH_PKTTYPE=y
CONFIG_NETFILTER_XT_MATCH_STATE=y
CONFIG_VETH=y
CONFIG_VLAN_8021Q=y
CONFIG_BRIDGE=y
CONFIG_BRIDGE_NETFILTER=y
CONFIG_EXT4_FS=y
CONFIG_EXT4_FS_POSIX_ACL=y
CONFIG_EXT4_FS_SECURITY=y
CONFIG_F2FS_FS=y
CONFIG_F2FS_FS_POSIX_ACL=y
CONFIG_INPUT_EVDEV=y
CONFIG_INPUT_UINPUT=y
CONFIG_PM=y
CONFIG_PM_SLEEP=y
CONFIG_SUSPEND=y
CONFIG_HIBERNATION=y
CONFIG_VT=y
CONFIG_VT_CONSOLE=y
CONFIG_VT_CONSOLE_SLEEP=y
CONFIG_HW_CONSOLE=y
CONFIG_USB_GADGET=y
CONFIG_USB_CONFIGFS=y
CONFIG_USB_CONFIGFS_F_FS=y
CONFIG_USB_CONFIGFS_F_MTP=y
CONFIG_USB_CONFIGFS_F_PTP=y
CONFIG_BT=y
CONFIG_BT_RFCOMM=y
CONFIG_BT_BNEP=y
CONFIG_BT_HCIUART=y
CONFIG_TUN=y
CONFIG_MACVLAN=y
CONFIG_BLK_DEV_LOOP=y
CONFIG_ANDROID=y
CONFIG_ANDROID_BINDER_IPC=y
CONFIG_ANDROID_BINDERFS=y
CONFIG_ANDROID_BINDER_DEVICES="binder,hwbinder,vndbinder"
ENDOFHALIUM

          scripts/kconfig/merge_config.sh -m .config ../patches/halium.config

          # Finalize config
          make ARCH=arm64 olddefconfig

          # Save and inspect
          cp .config ../final-halium.config
          echo "=== Key HALIUM configs in final .config ==="
          grep -E "^CONFIG_ANDROID=|^CONFIG_ARCH_HOLI=|^CONFIG_NAMESPACES=|^CONFIG_SECCOMP=|^CONFIG_USER_NS=|^CONFIG_CGROUPS=|^CONFIG_BRIDGE=|^CONFIG_VETH=|^CONFIG_TUN=|^CONFIG_QGKI=" .config || echo "(some might not show if default)"

      - name: Build kernel
        run: |
          cd kernel

          # Use aarch64 GCC cross-compiler for reliability
          # (clang cross-compile requires matching target triple)
          echo "Building kernel with GCC cross-compile (aarch64-linux-gnu-)..."
          make ARCH=arm64 \
               CROSS_COMPILE=aarch64-linux-gnu- \
               CC=aarch64-linux-gnu- \
               LD=aarch64-linux-gnu-ld \
               AR=aarch64-linux-gnu-ar \
               -j$(nproc) 2>&1 | tee ../build.log

          if [ -f arch/arm64/boot/Image ]; then
            echo ""
            echo "============================================"
            echo "  KERNEL BUILD SUCCESS"
            echo "============================================"
            ls -lh arch/arm64/boot/Image
          elif [ -f arch/arm64/boot/Image.gz ]; then
            echo ""
            echo "============================================"
            echo "  KERNEL BUILD SUCCESS (gzip compressed)"
            echo "============================================"
            ls -lh arch/arm64/boot/Image.gz
          else
            echo ""
            echo "============================================"
            echo "  KERNEL BUILD FAILED"
            echo "============================================"
            echo "--- Last 100 lines of build log ---"
            tail -100 ../build.log
            exit 1
          fi

      - name: Extract built modules
        run: |
          cd kernel
          mkdir -p ../built-modules
          find . -name "*.ko" -exec cp {} ../built-modules/ \; 2>/dev/null || true
          echo "Modules found: $(find ../built-modules -name '*.ko' 2>/dev/null | wc -l)"
          ls ../built-modules/ 2>/dev/null | head -20

      - name: Upload kernel image
        uses: actions/upload-artifact@v4
        with:
          name: kernel-image-${{ env.DEVICE_CODENAME }}
          path: kernel/arch/arm64/boot/Image
          retention-days: 30

      - name: Upload modules
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-modules-${{ env.DEVICE_CODENAME }}
          path: built-modules/
          retention-days: 30

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-config
          path: |
            build.log
            final-halium.config
          retention-days: 7
