name: Build Halium Kernel for OnePlus N200

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  KERNEL_REPO: OnePlusOSS/android_kernel_oneplus_sm4350
  KERNEL_BRANCH: oneplus/SM4350_R_11.0
  DEVICE_CODENAME: dre
  KERNEL_IMAGE_NAME: Image

jobs:
  build-kernel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential clang cpio flex \
            gcc-aarch64-linux-gnu git kmod libelf-dev \
            libssl-dev lz4 make python3 rsync
          aarch64-linux-gnu-gcc --version
          clang --version

      - name: Clone kernel source
        run: |
          git clone --depth 1 --branch $KERNEL_BRANCH \
            https://github.com/$KERNEL_REPO.git kernel
          cd kernel
          git log --oneline -1
          echo "=== Available defconfigs ==="
          ls arch/arm64/configs/
          echo "=== Vendor configs ==="
          ls arch/arm64/configs/vendor/
          cd ..

      - name: Build kernel config (defconfig + holi_QGKI fragment + Halium fragment)
        run: |
          cd kernel

          # Step 1: Start from base defconfig
          make ARCH=arm64 defconfig

          # Step 2: Apply holi QGKI config fragment
          scripts/kconfig/merge_config.sh -m .config \
            arch/arm64/configs/vendor/holi_QGKI.config

          # Step 3: Create and apply our Halium config fragment
          mkdir -p ../patches
          cat > ../patches/halium.config << 'HALIUME OF'
          # Halium (Android compatibility) configs
          CONFIG_NAMESPACES=y
          CONFIG_NET_NS=y
          CONFIG_PID_NS=y
          CONFIG_IPC_NS=y
          CONFIG_UTS_NS=y
          CONFIG_USER_NS=y
          CONFIG_CGROUPS=y
          CONFIG_CGROUP_CPUACCT=y
          CONFIG_CGROUP_SCHED=y
          CONFIG_FAIR_GROUP_SCHED=y
          CONFIG_RT_GROUP_SCHED=y
          CONFIG_SECCOMP=y
          CONFIG_SECCOMP_FILTER=y
          CONFIG_KEYS=y
          CONFIG_KEY_DH_OPERATION=y
          CONFIG_SECURITY=y
          CONFIG_SECURITY_SELINUX=y
          CONFIG_SECURITY_SELINUX_BOOTPARAM=y
          CONFIG_SECURITY_SELINUX_DEVELOP=y
          CONFIG_AUDIT=y
          CONFIG_AUDITSYSCALL=y
          CONFIG_DEVTMPFS=y
          CONFIG_DEVTMPFS_MOUNT=y
          CONFIG_TMPFS=y
          CONFIG_TMPFS_POSIX_ACL=y
          CONFIG_SQUASHFS=y
          CONFIG_SQUASHFS_LZ4=y
          CONFIG_IKCONFIG=y
          CONFIG_IKCONFIG_PROC=y
          CONFIG_LOG_BUF_SHIFT=18
          CONFIG_PRINTK_TIME=y
          CONFIG_MAGIC_SYSRQ=y

          # Networking for Ubuntu Touch
          CONFIG_NETFILTER=y
          CONFIG_IP_NF_IPTABLES=y
          CONFIG_IP_NF_FILTER=y
          CONFIG_IP_NF_NAT=y
          CONFIG_NETFILTER_XTABLES=y
          CONFIG_NETFILTER_XT_MATCH_PKTTYPE=y
          CONFIG_NETFILTER_XT_MATCH_STATE=y
          CONFIG_VETH=y
          CONFIG_VLAN_8021Q=y
          CONFIG_BRIDGE=y
          CONFIG_BRIDGE_NETFILTER=y

          # Filesystems
          CONFIG_EXT4_FS=y
          CONFIG_EXT4_FS_POSIX_ACL=y
          CONFIG_EXT4_FS_SECURITY=y
          CONFIG_F2FS_FS=y
          CONFIG_F2FS_FS_POSIX_ACL=y

          # Input devices
          CONFIG_INPUT_EVDEV=y
          CONFIG_INPUT_UINPUT=y

          # Power management
          CONFIG_PM=y
          CONFIG_PM_SLEEP=y
          CONFIG_SUSPEND=y
          CONFIG_HIBERNATION=y

          # Virtual terminal
          CONFIG_VT=y
          CONFIG_VT_CONSOLE=y
          CONFIG_VT_CONSOLE_SLEEP=y
          CONFIG_HW_CONSOLE=y

          # USB gadget
          CONFIG_USB_GADGET=y
          CONFIG_USB_CONFIGFS=y
          CONFIG_USB_CONFIGFS_F_FS=y
          CONFIG_USB_CONFIGFS_F_MTP=y
          CONFIG_USB_CONFIGFS_F_PTP=y

          # Bluetooth
          CONFIG_BT=y
          CONFIG_BT_RFCOMM=y
          CONFIG_BT_BNEP=y
          CONFIG_BT_HCIUART=y

          # Tun/Tap for networking
          CONFIG_TUN=y
          CONFIG_MACVLAN=y

          # Loop device
          CONFIG_BLK_DEV_LOOP=y

          # Android Binder IPC
          CONFIG_ANDROID=y
          CONFIG_ANDROID_BINDER_IPC=y
          CONFIG_ANDROID_BINDERFS=y
          CONFIG_ANDROID_BINDER_DEVICES="binder,hwbinder,vndbinder"
EOF

          scripts/kconfig/merge_config.sh -m .config ../patches/halium.config

          # Make olddefconfig to resolve any conflicts
          make ARCH=arm64 olddefconfig

          # Save final config
          cp .config ../final-halium.config
          echo "Config saved. Key configs:"
          grep -E "^CONFIG_ANDROID|^CONFIG_NAMESPACES|^CONFIG_SECCOMP|^CONFIG_USER_NS|^CONFIG_CGROUP_|^CONFIG_BRIDGE|^CONFIG_VETH|^CONFIG_TUN" .config

      - name: Build kernel
        run: |
          cd kernel
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            CC=clang -j$(nproc) 2>&1 | tee ../build.log

          if [ -f arch/arm64/boot/$KERNEL_IMAGE_NAME ]; then
            echo "Kernel build SUCCESS"
            ls -lh arch/arm64/boot/$KERNEL_IMAGE_NAME
          else
            echo "Kernel build FAILED - checking for errors"
            tail -50 ../build.log
            exit 1
          fi

      - name: Extract built modules
        run: |
          cd kernel
          mkdir -p ../built-modules
          find . -name "*.ko" -exec cp {} ../built-modules/ \; 2>/dev/null || true
          echo "Total modules built: $(find ../built-modules -name '*.ko' 2>/dev/null | wc -l)"
          ls ../built-modules/ | head -20

      - name: Upload boot image artifact
        uses: actions/upload-artifact@v4
        with:
          name: halium-boot-${{ env.DEVICE_CODENAME }}
          path: kernel/arch/arm64/boot/${{ env.KERNEL_IMAGE_NAME }}
          retention-days: 30

      - name: Upload modules
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-modules-${{ env.DEVICE_CODENAME }}
          path: built-modules/
          retention-days: 30

      - name: Upload logs and config
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build.log
            final-halium.config
          retention-days: 7
