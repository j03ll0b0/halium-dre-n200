name: Build Halium Kernel for OnePlus N200

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  KERNEL_REPO: OnePlusOSS/android_kernel_oneplus_sm4350
  KERNEL_BRANCH: oneplus/SM4350_R_11.0
  KERNEL_DEFCONFIG: vendor/holi-qgki_defconfig
  HARDWARE_OPLUS_REPO: LineageOS/android_hardware_oplus
  HARDWARE_OPLUS_BRANCH: lineage-23.2
  DEVICE_CODENAME: dre
  KERNEL_IMAGE_NAME: Image

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc \
            bison \
            build-essential \
            clang \
            cpio \
            flex \
            gcc-aarch64-linux-gnu \
            git \
            kmod \
            libelf-dev \
            libssl-dev \
            lz4 \
            make \
            python3 \
            rsync
          
          # Verify toolchain
          aarch64-linux-gnu-gcc --version
          clang --version

      - name: Clone kernel source
        run: |
          git clone --depth 1 --branch $KERNEL_BRANCH \
            https://github.com/$KERNEL_REPO.git kernel
          echo "Kernel cloned to ./kernel"
          cd kernel
          git log --oneline -1
          cd ..

      - name: Clone hardware/oplus dependency
        run: |
          mkdir -p hardware
          git clone --depth 1 --branch $HARDWARE_OPLUS_BRANCH \
            https://github.com/$HARDWARE_OPLUS_REPO.git \
            hardware/oplus
          echo "hardware/oplus cloned"

      - name: Apply Halium config patches
        run: |
          cd kernel
          
          # Create halium defconfig based on vendor defconfig
          cp arch/arm64/configs/$KERNEL_DEFCONFIG \
             arch/arm64/configs/halium_defconfig
          
          # Append Halium-required kernel configs
          cat >> arch/arm64/configs/halium_defconfig << 'EOF'
          
          # Halium / Android compatibility configs
          CONFIG_ANDROID=y
          CONFIG_ANDROID_BINDER_IPC=y
          CONFIG_ANDROID_BINDERFS=y
          CONFIG_ANDROID_BINDER_DEVICES=binder,hwbinder,vndbinder
          CONFIG_CGROUP_CPUACCT=y
          CONFIG_CGROUP_SCHED=y
          CONFIG_FAIR_GROUP_SCHED=y
          CONFIG_RT_GROUP_SCHED=y
          CONFIG_NAMESPACES=y
          CONFIG_PID_NS=y
          CONFIG_NET_NS=y
          CONFIG_IPC_NS=y
          CONFIG_UTS_NS=y
          CONFIG_USER_NS=y
          CONFIG_SECCOMP=y
          CONFIG_SECCOMP_FILTER=y
          CONFIG_KEYS=y
          CONFIG_SECURITY=y
          CONFIG_SECURITY_SELINUX=y
          CONFIG_SECURITY_SELINUX_BOOTPARAM=y
          CONFIG_SECURITY_SELINUX_DEVELOP=y
          CONFIG_AUDIT=y
          CONFIG_AUDITSYSCALL=y
          CONFIG_DEVTMPFS=y
          CONFIG_DEVTMPFS_MOUNT=y
          CONFIG_TMPFS=y
          CONFIG_SQUASHFS=y
          CONFIG_SQUASHFS_LZ4=y
          CONFIG_IKCONFIG=y
          CONFIG_IKCONFIG_PROC=y
          CONFIG_LOG_BUF_SHIFT=18
          CONFIG_PRINTK_TIME=y
          CONFIG_MAGIC_SYSRQ=y
          
          # Networking for Ubuntu Touch
          CONFIG_NETFILTER=y
          CONFIG_IP_NF_IPTABLES=y
          CONFIG_IP_NF_FILTER=y
          CONFIG_IP_NF_NAT=y
          CONFIG_NETFILTER_XTABLES=y
          CONFIG_NETFILTER_XT_MATCH_PKTTYPE=y
          CONFIG_NETFILTER_XT_MATCH_STATE=y
          CONFIG_VETH=y
          CONFIG_VLAN_8021Q=y
          CONFIG_BRIDGE=y
          CONFIG_BRIDGE_NETFILTER=y
          
          # Filesystems
          CONFIG_EXT4_FS=y
          CONFIG_EXT4_FS_POSIX_ACL=y
          CONFIG_EXT4_FS_SECURITY=y
          CONFIG_F2FS_FS=y
          CONFIG_F2FS_FS_POSIX_ACL=y
          CONFIG_SQUASHFS=y
          
          # Input devices
          CONFIG_INPUT_EVDEV=y
          CONFIG_INPUT_UINPUT=y
          
          # Power
          CONFIG_PM=y
          CONFIG_PM_SLEEP=y
          CONFIG_PM_RUNTIME=y
          CONFIG_SUSPEND=y
          CONFIG_HIBERNATION=y
          
          # Misc
          CONFIG_VT=y
          CONFIG_VT_CONSOLE=y
          CONFIG_VT_CONSOLE_SLEEP=y
          CONFIG_HW_CONSOLE=y
          CONFIG_USB_FUNCTION=y
          CONFIG_USB_GADGET=y
          CONFIG_USB_CONFIGFS=y
          CONFIG_USB_CONFIGFS_F_FS=y
          CONFIG_USB_CONFIGFS_F_MTP=y
          CONFIG_USB_CONFIGFS_F_PTP=y
          EOF
          
          echo "Halium defconfig created"
          
          cd ..

      - name: Generate full config and verify Halium options
        run: |
          cd kernel
          
          # Initialize config
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- halium_defconfig
          
          # Check critical configs are enabled
          echo "Checking Halium-critical configs..."
          grep -E "^CONFIG_ANDROID=y|^CONFIG_ANDROID_BINDER_IPC=y|^CONFIG_ANDROID_BINDERFS=y" .config || \
            echo "Warning: some Android configs missing"
          
          grep -E "^CONFIG_CGROUP_|^CONFIG_SECCOMP|^CONFIG_USER_NS|^CONFIG_NET_NS" .config | head -20
          
          # Save the generated config for reference
          cp .config ../halium_kernel.config
          
          cd ..

      - name: Build kernel
        run: |
          cd kernel
          
          # Build with Clang
          CC=clang \
          CROSS_COMPILE=aarch64-linux-gnu- \
          make ARCH=arm64 -j$(nproc) || \
          CC=clang \
          CROSS_COMPILE=aarch64-linux-gnu- \
          make ARCH=arm64 -j$(nproc)
          
          echo "Kernel build completed"
          ls -lh arch/arm64/boot/$KERNEL_IMAGE_NAME
          
          cd ..

      - name: Extract built modules
        run: |
          cd kernel
          
          # Find all built modules
          mkdir -p ../built-modules
          find . -name "*.ko" -exec cp {} ../built-modules/ \;
          
          echo "Modules extracted:"
          ls -lh ../built-modules/ | head -20
          echo "Total modules: $(find ../built-modules -name '*.ko' | wc -l)"
          
          cd ..

      - name: Create boot image
        run: |
          # Create boot.img using the extracted kernel + vendor blobs
          # We'll use the mkbootimg script from Android
          
          # Download mkbootimg
          git clone --depth 1 https://android.googlesource.com/platform/system/tools/mkbootimg
          
          # Create minimal ramdisk (empty for now, will be populated later)
          mkdir -p ramdisk
          cd ramdisk
          echo "#!/system/bin/sh" > init
          chmod +x init
          find . | cpio -H newc -o > ../minimal.cpio
          cd ..
          gzip -c minimal.cpio > ramdisk.cpio.gz
          
          # Build boot.img
          python3 mkbootimg/mkbootimg.py \
            --kernel kernel/arch/arm64/boot/$KERNEL_IMAGE_NAME \
            --ramdisk ramdisk.cpio.gz \
            --header_version 3 \
            --pagesize 4096 \
            --cmdline "androidboot.hardware=qcom androidboot.memcg=1 androidboot.usbcontroller=4e00000.dwc3 cgroup.memory=nokmem,nosocket loop.max_part=7 lpm_levels.sleep_disabled=1 msm_rtb.filter=0x237 reboot=panic_warm service_locator.enable=1 swiotlb=0 iptable_raw.raw_before_defrag=1 ip6table_raw.raw_before_defrag=1" \
            --output boot-halium-dre.img
          
          ls -lh boot-halium-dre.img
          md5sum boot-halium-dre.img

      - name: Upload boot image artifact
        uses: actions/upload-artifact@v4
        with:
          name: halium-boot-${{ env.DEVICE_CODENAME }}
          path: |
            boot-halium-dre.img
          retention-days: 30

      - name: Upload kernel image and modules
        uses: actions/upload-artifact@v4
        with:
          name: kernel-and-modules-${{ env.DEVICE_CODENAME }}
          path: |
            kernel/arch/arm64/boot/$KERNEL_IMAGE_NAME
            built-modules/
            halium_kernel.config
          retention-days: 30

      - name: Upload kernel build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            kernel/.config
          retention-days: 7

  create-release:
    needs: build-kernel
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Download boot image
        uses: actions/download-artifact@v4
        with:
          name: halium-boot-dre

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: halium-boot-dre-${{ github.run_number }}
          name: Halium Boot Image for OnePlus N200 (dre) - Build ${{ github.run_number }}
          files: boot-halium-dre.img
          body: |
            ## Halium Boot Image for OnePlus N200 (DE2117)
            
            **Device:** OnePlus Nord N200 (DE2117, codename: dre)
            **Platform:** SM4350 (Snapdragon 480 5G)
            **Kernel:** 5.4.300-QGKI with Halium patches
            
            ### Installation
            ```
            fastboot flash boot boot-halium-dre.img
            fastboot reboot
            ```
            
            ### Contents
            - Halium-patched kernel with Android compatibility configs
            - Minimal ramdisk for early boot testing
            
            ### Next Steps
            - Flash Ubuntu Touch system image to data partition
            - Test hardware (display, touch, audio, WiFi, sensors)
            
            **Build:** ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
